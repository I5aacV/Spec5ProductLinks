<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpecFive — Leave a Review</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --accent: #1D9E75;
    --accent-dim: #1D9E751a;
    --accent-border: #1D9E7540;
    --text-primary: #1a1a18;
    --text-secondary: #6b7068;
    --text-muted: #8a8880;
    --border: #D8DACE;
    --bg: #ffffff;
    --surface: #F3F4EE;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  /* ── CUSTOM SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--surface); }
  ::-webkit-scrollbar-thumb {
    background: var(--accent-border);
    border-radius: 0;
  }
  ::-webkit-scrollbar-thumb:hover { background: var(--accent); }
  * { scrollbar-width: thin; scrollbar-color: #1D9E7540 #F3F4EE; }

  body {
    background: var(--bg);
    color: var(--text-primary);
    font-family: 'Neue Haas Grotesk Display Pro', 'Barlow', sans-serif;
    min-height: 100vh;
    padding-bottom: 80px;
  }

  /* ── HERO ── */
  .hero {
    padding: 72px 32px 56px;
    border-bottom: 1px solid var(--border);
    text-align: center;
  }

  .hero-inner {
    max-width: 640px;
    margin: 0 auto;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    margin-bottom: 16px;
  }

  .eyebrow-dot {
    width: 5px; height: 5px;
    border-radius: 0;
    background: var(--accent);
    flex-shrink: 0;
  }

  .eyebrow-text {
    font-size: 15px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  h1 {
    font-size: clamp(36px, 5vw, 58px);
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.1;
    margin: 0 0 16px;
    letter-spacing: -0.01em;
  }

  .subhead {
    font-size: 19px;
    color: var(--text-secondary);
    line-height: 1.7;
    max-width: 480px;
    margin: 0 auto;
  }

  /* ── CONTAINER ── */
  .container {
    max-width: 960px;
    margin: 0 auto;
    padding: 48px 32px 0;
    display: flex;
    flex-direction: column;
    gap: 48px;
  }

  /* ── FAMILY GROUP ── */
  .family-group {
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  .family-header {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 12px;
  }

  .family-label {
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--text-muted);
  }

  .family-line {
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .family-products {
    display: flex;
    flex-direction: column;
    gap: 0;
    border: 1px solid var(--border);
  }

  /* products inside a family share one outer border */
  .family-products .product-block {
    border: none;
    border-bottom: 1px solid var(--border);
  }

  .family-products .product-block:last-child {
    border-bottom: none;
  }

  /* standalone products keep their own border */
  .product-block {
    border: 1px solid var(--border);
    overflow: hidden;
  }

  /* ── PRODUCT HEADER ── */
  .product-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 20px 24px;
    background: #ffffff;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid transparent;
    transition: background 0.15s;
  }

  .product-header:hover { background: var(--surface); }

  .product-block.open .product-header {
    border-bottom-color: var(--border);
    background: var(--surface);
  }

  .product-header-left {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .product-num {
    font-size: 13px;
    font-weight: 500;
    color: var(--accent);
    background: var(--accent-dim);
    border: 1px solid var(--accent-border);
    min-width: 28px;
    height: 28px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    border-radius: 0;
    letter-spacing: 0.03em;
  }

  .product-name {
    font-size: 22px;
    font-weight: 600;
    color: var(--text-primary);
    line-height: 1.2;
  }

  .product-hint {
    font-size: 15px;
    color: var(--text-muted);
    margin-top: 2px;
    font-weight: 400;
  }

  .product-block.open .product-hint { display: none; }

  .chevron-wrap {
    width: 22px; height: 22px;
    border: 1px solid var(--accent-border);
    background: var(--accent-dim);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: transform 0.25s ease, background 0.2s, border-color 0.2s;
    border-radius: 0;
  }

  .product-block.open .chevron-wrap {
    transform: rotate(45deg);
    background: var(--accent);
    border-color: var(--accent);
  }

  .chevron-wrap svg path { transition: stroke 0.2s; }
  .product-block.open .chevron-wrap svg path { stroke: #ffffff; }

  /* ── COLLAPSIBLE BODY ── */
  .product-body { display: none; }
  .product-block.open .product-body { display: block; }

  /* ── VARIANT SECTION ── */
  .variant-section {
    padding: 24px 24px 20px;
    border-bottom: 1px solid var(--border);
    background: #ffffff;
  }
  .variant-section:last-child { border-bottom: none; }

  .variant-label {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 16px;
  }

  .variant-dot {
    width: 5px; height: 5px;
    border-radius: 0;
    flex-shrink: 0;
  }
  .dot-mesh     { background: #1D9E75; }
  .dot-atak     { background: #2d6ab4; }
  .dot-meshcore { background: #9a6520; }

  .variant-label-text {
    font-size: 14px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
  .label-mesh     { color: #1D9E75; }
  .label-atak     { color: #2d6ab4; }
  .label-meshcore { color: #9a6520; }

  /* ── COLOR GRID ── */
  .color-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 0;
    border: 1px solid var(--border);
  }

  .color-btn {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 20px 8px;
    text-decoration: none;
    border-right: 1px solid var(--border);
    background: #ffffff;
    transition: background 0.15s;
    cursor: pointer;
    min-height: 110px;
  }

  .color-btn:last-child { border-right: none; }
  .color-btn:hover { background: var(--surface); }
  .color-btn:active { background: #eaebe4; }

  .color-swatch {
    width: 28px; height: 28px;
    border-radius: 50%;
    border: 1px solid var(--border);
    flex-shrink: 0;
  }

  .swatch-standard    { background: #4A4A4A; border-color: #8a8880; }
  .swatch-black       { background: #1A1A1A; border-color: #444; }
  .swatch-white       { background: #F5F5F5; border-color: #D8DACE; }
  .swatch-spec5green  { background: #1D9E75; border-color: #0F6E56; }
  .swatch-tacgreen    { background: #3B5323; border-color: #5a7a40; }
  .swatch-desert      { background: #C2A06E; border-color: #a87d47; }

  .color-label {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    text-align: center;
    line-height: 1.3;
    text-transform: uppercase;
  }

  .review-cta {
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    font-weight: 500;
  }

  /* ── FOOTER ── */
  .page-footer {
    max-width: 960px;
    margin: 56px auto 0;
    padding: 24px 32px 0;
    border-top: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .footer-brand {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .footer-dot {
    width: 5px; height: 5px;
    border-radius: 0;
    background: var(--accent);
  }

  .footer-name {
    font-size: 15px;
    font-weight: 500;
    color: var(--text-primary);
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .footer-link {
    font-size: 15px;
    color: var(--accent);
    text-decoration: none;
    letter-spacing: 0.03em;
  }
  .footer-link:hover { text-decoration: underline; }

  /* ── RESPONSIVE ── */
  @media (max-width: 720px) {
    .color-grid { grid-template-columns: repeat(3, 1fr); }
    .color-btn { border-bottom: 1px solid var(--border); border-right: 1px solid var(--border); }
    .color-btn:nth-child(3n) { border-right: none; }
    .color-btn:nth-last-child(-n+3) { border-bottom: none; }
    .hero, .container, .page-footer { padding-left: 20px; padding-right: 20px; }
    .product-header { padding: 16px 20px; }
    .variant-section { padding: 20px 20px 16px; }
  }

  @media (max-width: 480px) {
    .color-grid { grid-template-columns: repeat(2, 1fr); }
    .color-btn:nth-child(3n) { border-right: 1px solid var(--border); }
    .color-btn:nth-child(2n) { border-right: none; }
    .color-btn:nth-last-child(-n+3) { border-bottom: 1px solid var(--border); }
    .color-btn:nth-last-child(-n+2) { border-bottom: none; }
    .product-name { font-size: 18px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-inner">
    <div class="eyebrow">
      <span class="eyebrow-dot"></span>
      <span class="eyebrow-text">Customer reviews</span>
    </div>
    <h1>Leave Us a Review</h1>
    <p class="subhead">Find your product below, then tap the color and firmware variant that matches your order.</p>
  </div>
</div>

<div class="container" id="products"></div>

<footer class="page-footer">
  <div class="footer-brand">
    <span class="footer-dot"></span>
    <span class="footer-name">SpecFive</span>
  </div>
  <a class="footer-link" href="https://specfive.com" target="_blank">specfive.com ↗</a>
</footer>

<script>
const COLORS = [
  { key: 'standard',   label: 'Standard',      swatch: 'swatch-standard'   },
  { key: 'black',      label: 'Black',          swatch: 'swatch-black'      },
  { key: 'white',      label: 'White',          swatch: 'swatch-white'      },
  { key: 'spec5green', label: 'Spec5 Green',    swatch: 'swatch-spec5green' },
  { key: 'tacgreen',   label: 'Tactical Green', swatch: 'swatch-tacgreen'   },
  { key: 'desert',     label: 'Desert Sand',    swatch: 'swatch-desert'     },
];

const VARIANTS = [
  { key: 'mesh',     label: 'Meshtastic', dotClass: 'dot-mesh',     labelClass: 'label-mesh'     },
  { key: 'atak',     label: 'ATAK',       dotClass: 'dot-atak',     labelClass: 'label-atak'     },
  { key: 'meshcore', label: 'MeshCore',   dotClass: 'dot-meshcore', labelClass: 'label-meshcore' },
];

// Groups: family label + array of product names.
// Single-item groups render without the family header.
const PRODUCT_GROUPS = [
  {
    family: 'Trekker Series',
    products: ['Trekker Bravo', 'Trekker Delta'],
  },
  {
    family: 'Ranger Series',
    products: ['Ranger', 'Ranger Magnum'],
  },
  {
    family: 'Spectre Series',
    products: ['Spectre', 'Spectre Pro'],
  },
  {
    family: null,
    products: ['Base Station Kit'],
  },
  {
    family: null,
    products: ['Solar Mesh Node'],
  },
  {
    family: null,
    products: ['Vehicle Relay Kit'],
  },
  {
    family: null,
    products: ['Repeater Unit'],
  },
  {
    family: null,
    products: ['Gateway Bridge'],
  },
  {
    family: null,
    products: ['Field Comms Pack'],
  },
];

function pad(n) { return n < 10 ? '0' + n : '' + n; }

let globalIndex = 0;

function buildProductBlock(name) {
  globalIndex++;
  const pi = globalIndex;

  const block = document.createElement('div');
  block.className = 'product-block';

  const header = document.createElement('div');
  header.className = 'product-header';
  header.setAttribute('role', 'button');
  header.setAttribute('tabindex', '0');
  header.setAttribute('aria-expanded', 'false');
  header.innerHTML = `
    <div class="product-header-left">
      <div class="product-num">${pad(pi)}</div>
      <div>
        <div class="product-name">${name}</div>
        <div class="product-hint">Tap to select firmware &amp; color</div>
      </div>
    </div>
    <div class="chevron-wrap" aria-hidden="true">
      <svg width="10" height="10" viewBox="0 0 10 10" fill="none">
        <path d="M5 1v8M1 5h8" stroke="#1D9E75" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>
  `;

  const toggle = () => {
    const isOpen = block.classList.contains('open');
    document.querySelectorAll('.product-block.open').forEach(b => {
      b.classList.remove('open');
      b.querySelector('.product-header').setAttribute('aria-expanded', 'false');
    });
    if (!isOpen) {
      block.classList.add('open');
      header.setAttribute('aria-expanded', 'true');
      setTimeout(() => block.scrollIntoView({ behavior: 'smooth', block: 'nearest' }), 50);
    }
  };

  header.addEventListener('click', toggle);
  header.addEventListener('keydown', e => {
    if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); toggle(); }
  });

  block.appendChild(header);

  const body = document.createElement('div');
  body.className = 'product-body';

  VARIANTS.forEach(variant => {
    const section = document.createElement('div');
    section.className = 'variant-section';

    const vLabel = document.createElement('div');
    vLabel.className = 'variant-label';
    vLabel.innerHTML = `
      <span class="variant-dot ${variant.dotClass}"></span>
      <span class="variant-label-text ${variant.labelClass}">${variant.label}</span>
    `;
    section.appendChild(vLabel);

    const grid = document.createElement('div');
    grid.className = 'color-grid';

    COLORS.forEach(color => {
      const a = document.createElement('a');
      a.className = 'color-btn';
      a.href = `https://amazon.com/review/placeholder-${pi}-${variant.key}-${color.key}`;
      a.target = '_blank';
      a.rel = 'noopener';
      a.innerHTML = `
        <div class="color-swatch ${color.swatch}"></div>
        <div class="color-label">${color.label}</div>
        <div class="review-cta">Review ↗</div>
      `;
      grid.appendChild(a);
    });

    section.appendChild(grid);
    body.appendChild(section);
  });

  block.appendChild(body);
  return block;
}

function buildPage() {
  const container = document.getElementById('products');

  PRODUCT_GROUPS.forEach(group => {
    if (group.family && group.products.length > 1) {
      // Family group wrapper
      const groupEl = document.createElement('div');
      groupEl.className = 'family-group';

      const familyHeader = document.createElement('div');
      familyHeader.className = 'family-header';
      familyHeader.innerHTML = `
        <span class="family-label">${group.family}</span>
        <span class="family-line"></span>
      `;
      groupEl.appendChild(familyHeader);

      const familyProducts = document.createElement('div');
      familyProducts.className = 'family-products';

      group.products.forEach(name => {
        familyProducts.appendChild(buildProductBlock(name));
      });

      groupEl.appendChild(familyProducts);
      container.appendChild(groupEl);
    } else {
      // Standalone product
      group.products.forEach(name => {
        container.appendChild(buildProductBlock(name));
      });
    }
  });
}

buildPage();
</script>
</body>
</html>
